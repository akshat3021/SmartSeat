<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartSeat | Exam Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        /* ── RESET & BASE ── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:        #0a0e1a;
            --surface:   #111827;
            --border:    rgba(255,255,255,0.08);
            --green:     #22c55e;
            --green-dim: rgba(34,197,94,0.12);
            --red:       #ef4444;
            --red-dim:   rgba(239,68,68,0.12);
            --muted:     rgba(255,255,255,0.35);
            --text:      #f0f4ff;
            --accent:    #6366f1;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 40px 16px 80px;
            /* Subtle grid background */
            background-image:
                linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* ── HEADER ── */
        header {
            width: 100%;
            max-width: 680px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 60px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 20px;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo span {
            color: var(--green);
        }

        .status-dot {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--muted);
        }

        .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--green);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50%       { opacity: 0.5; transform: scale(0.8); }
        }

        /* ── SEARCH SECTION ── */
        .search-section {
            width: 100%;
            max-width: 480px;
            text-align: center;
            animation: fadeUp 0.5s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .eyebrow {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 16px;
            font-weight: 500;
        }

        .search-section h1 {
            font-family: 'Syne', sans-serif;
            font-size: clamp(32px, 6vw, 52px);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -1.5px;
            margin-bottom: 12px;
        }

        .search-section h1 em {
            font-style: normal;
            color: var(--green);
        }

        .search-section p {
            color: var(--muted);
            font-size: 15px;
            margin-bottom: 36px;
            font-weight: 300;
        }

        .input-group {
            display: flex;
            gap: 8px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 6px 6px 6px 16px;
            transition: border-color 0.2s;
        }

        .input-group:focus-within {
            border-color: rgba(99,102,241,0.5);
        }

        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 16px;
            font-weight: 400;
            min-width: 0;
        }

        .input-group input::placeholder { color: var(--muted); }

        .input-group button {
            background: var(--green);
            color: #0a0e1a;
            border: none;
            border-radius: 10px;
            padding: 12px 24px;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.15s;
            white-space: nowrap;
        }

        .input-group button:hover   { opacity: 0.88; transform: scale(0.98); }
        .input-group button:active  { transform: scale(0.95); }
        .input-group button:disabled { opacity: 0.5; cursor: not-allowed; }

        .error-msg {
            margin-top: 12px;
            font-size: 13px;
            color: var(--red);
            min-height: 20px;
        }

        /* ── RESULT CARD ── */
        .result-card {
            display: none;
            width: 100%;
            max-width: 680px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            overflow: hidden;
            animation: fadeUp 0.4s ease both;
            margin-top: 32px;
        }

        /* Colored top stripe */
        .result-card::before {
            content: '';
            display: block;
            height: 3px;
            background: linear-gradient(90deg, var(--green), var(--accent));
        }

        .ticket-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            padding: 28px 28px 0;
        }

        .ticket-header h2 {
            font-family: 'Syne', sans-serif;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .ticket-header p {
            color: var(--muted);
            font-size: 14px;
            margin-top: 4px;
        }

        .close-btn {
            background: rgba(255,255,255,0.06);
            border: 1px solid var(--border);
            color: var(--muted);
            width: 36px; height: 36px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s, color 0.2s;
            flex-shrink: 0;
        }

        .close-btn:hover { background: var(--red-dim); color: var(--red); }

        .seat-info {
            display: flex;
            gap: 20px;
            padding: 16px 28px;
            border-bottom: 1px solid var(--border);
        }

        .seat-info span {
            font-size: 13px;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .seat-badge {
            display: inline-block;
            background: var(--green-dim);
            color: var(--green);
            border: 1px solid rgba(34,197,94,0.2);
            border-radius: 6px;
            padding: 2px 10px;
            font-size: 13px;
            font-weight: 500;
            margin-left: 8px;
        }

        /* ── VISUAL GRID ── */
        .visual-grid-container {
            padding: 24px 28px 28px;
        }

        .grid-label {
            text-align: center;
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 16px;
        }

        .classroom-grid {
            display: grid;
            gap: 8px;
            /* Columns set dynamically by JS */
        }

        .seat {
            aspect-ratio: 1;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: rgba(255,255,255,0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: clamp(16px, 3vw, 22px);
            transition: transform 0.15s;
            cursor: default;
            position: relative;
        }

        .seat.occupied   { background: rgba(255,255,255,0.05); }
        .seat.my-seat    {
            background: var(--green-dim);
            border-color: var(--green);
            box-shadow: 0 0 20px rgba(34,197,94,0.2);
            animation: glow 2s ease-in-out infinite;
        }
        .seat.gap-seat   { background: var(--red-dim); border-color: rgba(239,68,68,0.2); }

        @keyframes glow {
            0%, 100% { box-shadow: 0 0 16px rgba(34,197,94,0.2); }
            50%       { box-shadow: 0 0 28px rgba(34,197,94,0.45); }
        }

        /* ── LEGEND ── */
        .legend {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--muted);
        }

        .legend-dot {
            width: 12px; height: 12px;
            border-radius: 3px;
        }

        .legend-dot.my    { background: var(--green-dim); border: 1px solid var(--green); }
        .legend-dot.taken { background: rgba(255,255,255,0.05); border: 1px solid var(--border); }
        .legend-dot.empty { background: var(--red-dim); border: 1px solid rgba(239,68,68,0.2); }

        /* ── LOADING STATE ── */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 40px;
            color: var(--muted);
            font-size: 14px;
        }

        .spinner {
            width: 18px; height: 18px;
            border: 2px solid var(--border);
            border-top-color: var(--green);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <div class="logo">💺 <span>Smart</span>Seat</div>
        <div style="display:flex;align-items:center;gap:16px;"><div class="status-dot"><div class="dot"></div> Portal Live</div><a href="/logout" style="font-size:12px;color:var(--muted);text-decoration:none;border:1px solid var(--border);padding:5px 12px;border-radius:8px;transition:color 0.2s;" onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--muted)'">Logout</a></div>
    </header>

    <!-- ── SEARCH BOX ── -->
    <div class="search-section" id="searchBox">
        <p class="eyebrow">Exam Seating</p>
        <h1>Find Your <em>Seat</em></h1>
        <p>Enter your roll number to locate your exam seat instantly.</p>

        <div class="input-group">
            <input
                type="text"
                id="rollInput"
                placeholder="Enter roll number, e.g. 101"
                autocomplete="off"
                onkeydown="if(event.key==='Enter') findSeat()"
            >
            <button id="searchBtn" onclick="findSeat()">Search →</button>
        </div>
        <p class="error-msg" id="errorMsg"></p>
    </div>

    <!-- ── RESULT CARD ── -->
    <div class="result-card" id="resultCard">
        <div class="ticket-header">
            <div>
                <h2 id="studentName">Hi, Student!</h2>
                <p id="studentInfo">Branch: —</p>
            </div>
            <button class="close-btn" onclick="closeResult()">✕</button>
        </div>

        <div class="seat-info">
            <span>🎯 Roll No: <strong id="displayRoll">—</strong></span>
            <span>🏫 <span id="roomDisplay">—</span></span>
            <span>📍 Seat: <span class="seat-badge" id="seatDisplay">—</span></span>
        </div>

        <div class="visual-grid-container">
            <p class="grid-label">▼ &nbsp; Front of Class &nbsp; ▼</p>
            <div class="classroom-grid" id="gridTarget"></div>
            <div style="text-align:center;margin-bottom:16px;">
                <button onclick="downloadPDF()" style="background:var(--accent);color:#fff;border:none;border-radius:10px;padding:11px 24px;font-family:'Syne',sans-serif;font-weight:700;font-size:14px;cursor:pointer;transition:opacity 0.2s;" onmouseover="this.style.opacity='0.85'" onmouseout="this.style.opacity='1'">⬇ Download Admit Card PDF</button>
            </div>
            <div class="legend">
                <div class="legend-item"><div class="legend-dot my"></div> Your seat</div>
                <div class="legend-item"><div class="legend-dot taken"></div> Occupied</div>
                <div class="legend-item"><div class="legend-dot empty"></div> Gap seat</div>
            </div>
        </div>
    </div>

    <script>
    // ── STATE ──
    let currentStudentRow = -1;
    let currentStudentCol = -1;
    let currentRoomNo     = '';

    // ── FIND SEAT ──
    // Calls Flask route: GET /seat/<roll_no>
    // Then calls GET /grid to render the full classroom
    async function findSeat() {
        const input   = document.getElementById('rollInput');
        const errorEl = document.getElementById('errorMsg');
        const btn     = document.getElementById('searchBtn');
        const roll    = input.value.trim();

        // Clear previous errors
        errorEl.textContent = '';

        if (!roll) {
            errorEl.textContent = 'Please enter a roll number.';
            return;
        }

        // Show loading state on button
        btn.textContent  = 'Searching...';
        btn.disabled     = true;

        try {
            // ── STEP 1: Fetch this student's seat from Flask ──
            const res  = await fetch(`/seat/${encodeURIComponent(roll)}`);
            const data = await res.json();

            if (!res.ok) {
                // Flask returned an error (404 = not found, 400 = seats not assigned)
                errorEl.textContent = data.error || 'Something went wrong.';
                return;
            }

            // ── STEP 2: Save student seat position for grid rendering ──
            currentStudentRow = data.row;
            currentStudentCol = data.col;
            currentRoomNo    = data.room_no;

            // ── STEP 3: Populate the result card with real data ──
            document.getElementById('studentName').textContent = `Hi, ${data.name}!`;
            document.getElementById('studentInfo').textContent = `Branch: ${data.branch}`;
            document.getElementById('displayRoll').textContent = data.roll_no;
            document.getElementById('seatDisplay').textContent = data.display;
            document.getElementById('roomDisplay').textContent = 'Room ' + data.room_no;

            // ── STEP 4: Fetch the full grid and render it ──
            await renderGrid(data.room_no);

            // ── STEP 4.5: Fetch exam info ──
            try {
                const examRes  = await fetch('/exam_info');
                const examData = await examRes.json();
                document.getElementById('examNameDisplay').textContent = examData.exam_name || 'Examination';
                const subj = examData.subject ? ' (' + examData.subject + ')' : '';
                document.getElementById('examNameDisplay').textContent = (examData.exam_name || 'Examination') + subj;
                document.getElementById('examDateDisplay').textContent = examData.exam_date ? 'Date: ' + examData.exam_date : '';
            } catch(e) {}

            // ── STEP 5: Show the result card ──
            document.getElementById('resultCard').style.display = 'block';
            document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'start' });

        } catch (err) {
            // Network error — Flask server might be down
            errorEl.textContent = 'Cannot connect to server. Is Flask running?';
            console.error(err);
        } finally {
            btn.textContent = 'Search →';
            btn.disabled    = false;
        }
    }

    // ── RENDER GRID ──
    // Calls Flask route: GET /grid
    // Returns all assigned seats so we can draw the full classroom
    async function renderGrid(roomNo) {
        const gridEl = document.getElementById('gridTarget');
        gridEl.innerHTML = '<div class="loading"><div class="spinner"></div> Loading grid...</div>';

        try {
            const res  = await fetch('/grid/' + encodeURIComponent(roomNo));
            const data = await res.json();

            // data = { rows: 5, cols: 5, seats: [ {roll_no, name, branch, row, col}, ... ] }
            const { rows, cols, seats } = data;

            // Set CSS grid columns dynamically based on room size
            gridEl.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
            gridEl.innerHTML = '';

            // Build a lookup map: "row-col" -> seat data
            // So we know which seats are occupied
            const occupiedMap = {};
            seats.forEach(s => {
                occupiedMap[`${s.row}-${s.col}`] = s;
            });

            // Render every cell in the grid
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell    = document.createElement('div');
                    const key     = `${r}-${c}`;
                    const isMe    = (r === currentStudentRow && c === currentStudentCol);
                    const student = occupiedMap[key];

                    if (isMe) {
                        // ── MY SEAT — highlighted green ──
                        cell.className = 'seat my-seat';
                        cell.textContent = '👋';
                        cell.title = 'Your seat';
                    } else if (student) {
                        // ── OCCUPIED by someone else ──
                        cell.className = 'seat occupied';
                        cell.textContent = '🪑';
                        cell.title = `${student.branch}`;
                    } else {
                        // ── EMPTY / GAP SEAT ──
                        cell.className = 'seat gap-seat';
                        cell.textContent = '';
                        cell.title = 'Empty';
                    }

                    gridEl.appendChild(cell);
                }
            }
        } catch (err) {
            gridEl.innerHTML = '<p style="color:var(--muted);padding:20px;text-align:center">Could not load grid.</p>';
            console.error(err);
        }
    }

    // ── CLOSE RESULT ──
    function closeResult() {
        document.getElementById('resultCard').style.display = 'none';
        document.getElementById('rollInput').value = '';
        document.getElementById('errorMsg').textContent = '';
        currentStudentRow = -1;
        currentStudentCol = -1;
    }
// ── DOWNLOAD ADMIT CARD PDF ──
async function downloadPDF() {
    const roll = document.getElementById('rollInput').value.trim();
    if (!roll) return;

    try {
        const res  = await fetch('/admit_card/' + encodeURIComponent(roll));
        const data = await res.json();
        if (!res.ok) { alert(data.error); return; }

        window.jsPDF = window.jspdf.jsPDF;
        const doc = new window.jsPDF({ orientation:'portrait', unit:'mm', format:'a4' });

        doc.setFont('helvetica');

        // --- HEADER ---
        doc.setFontSize(16); doc.setFont('helvetica', 'bold');
        doc.text('Graphic Era HILL UNIVERSITY', 105, 20, { align: 'center' }); 
        
        doc.setFontSize(10); doc.setFont('helvetica', 'normal');
        doc.text('510, Society Area, Clement Town, Dehradun 248002 Uttarakhand (INDIA)', 105, 26, { align: 'center' }); 
        doc.text('www.gehu.ac.in', 105, 31, { align: 'center' }); 

        doc.setFontSize(14); doc.setFont('helvetica', 'bold');
        doc.text('ADMIT CARD', 105, 40, { align: 'center' }); 
        
        doc.setFontSize(11);
        doc.text('TERM EVALUATION THEORY REGULAR EXAM (EVEN SEMESTER), FEBRUARY 2026', 105, 46, { align: 'center' }); 

        // --- REAL DYNAMIC STUDENT DETAILS ---
        doc.setFontSize(10);
        doc.setFont('helvetica', 'bold');
        doc.text('Name of Candidate:', 15, 60); 
        doc.setFont('helvetica', 'normal');
        doc.text(data.name || 'N/A', 55, 60);

        doc.setFont('helvetica', 'bold');
        doc.text("Father's Name:", 15, 66); 
        doc.setFont('helvetica', 'normal');
        doc.text(data.father_name || 'N/A', 55, 66); // REAL DATA!

        doc.setFont('helvetica', 'bold');
        doc.text('Roll No.:', 15, 72); 
        doc.setFont('helvetica', 'normal');
        doc.text(data.roll_no || 'N/A', 55, 72);

        doc.setFont('helvetica', 'bold');
        doc.text('Enrollment No. :', 15, 78); 
        doc.setFont('helvetica', 'normal');
        doc.text(data.enrollment_no || 'N/A', 55, 78); // REAL DATA!

        doc.setFont('helvetica', 'bold');
        doc.text('Program:', 120, 60); 
        doc.setFont('helvetica', 'normal');
        doc.text(data.program || 'N/A', 145, 60); // REAL DATA!

        doc.setFont('helvetica', 'bold');
        doc.text('Semester:', 120, 66); 
        doc.setFont('helvetica', 'normal');
        doc.text(String(data.semester) || 'N/A', 145, 66); // REAL DATA!

        doc.setFont('helvetica', 'bold');
        doc.text('Branch:', 120, 72); 
        doc.setFont('helvetica', 'normal');
        doc.text(data.branch || 'N/A', 145, 72);

        doc.setFont('helvetica', 'bold');
        doc.text('Sec:', 120, 78); 
        doc.setFont('helvetica', 'normal');
        doc.text(data.section || 'N/A', 145, 78); // REAL DATA!

        // --- EXAM SCHEDULE TABLE ---
        doc.autoTable({
            startY: 90,
            head: [['S.No.', 'Sub Code', 'Sub Name', 'Status', 'Exam Date', 'Exam Time', 'Examination Center / Room']], 
            body: [
                ['1', data.subject || 'N/A', data.exam_name || 'N/A', 'Clear', data.exam_date || 'N/A', '11:30 AM 01:00 PM', `GEHU-DDN Campus | CR-${data.room_no || 'N/A'}`] 
            ],
            theme: 'grid',
            headStyles: { fillColor: [240, 240, 240], textColor: 0, fontStyle: 'bold', halign: 'center', lineWidth: 0.1, lineColor: [0, 0, 0] },
            styles: { fontSize: 9, halign: 'center', cellPadding: 3, textColor: 0, lineWidth: 0.1, lineColor: [0, 0, 0] }
        });

        let finalY = doc.lastAutoTable.finalY + 25;

        // --- SIGNATURES & INSTRUCTIONS ---
        doc.setFontSize(10);
        doc.setFont('helvetica', 'bold');
        doc.text('Registrar', 15, finalY); 
        doc.text('Student Signature', 160, finalY); 

        finalY += 15;
        doc.setFontSize(11);
        doc.text('Important Instructions', 15, finalY); 

        doc.setFontSize(9);
        doc.setFont('helvetica', 'normal');
        const instructions = [
            "1. Students should report to the examination center wearing official University Uniform.", 
            "2. Students must carry their Identity Card and Admit Card to enter the Examination Hall.", 
            "3. Students must be seated in their respective seats at least 15 minutes prior to the commencement of the examination.", 
            "4. The students are not allowed to carry bags, mobile phones, smart watches, helmets, wallets, pouches and calculator covers, etc. to the examination hall.", 
            "5. The students shall not be in possession of any written material on their hands or any other part of their body, any clothing item writing pads, inner and outer covers of calculator/geometry box, hand kerchief, etc.,", 
            "6. The student shall not possess mobile phones or any other electronic gadget such as, Smart watch, memory chip etc., in the Examination Hall.", 
            "7. University/Examination center will not be responsible for student's belongings.", 
            "8. Students must ensure that they fill the correct information in their answer booklets and bubble in the correct allotted space.", 
            "9. Do not tear any page of your answer book. This can lead to cancellation of your paper.", 
            "10. Exchange of any material in examination hall is not allowed. Use of any type of electronic gadget is prohibited.", 
            "11. Any illegal activity and misbehavior in examination hall will be liable to be charged with UFM.", 
            "12. Follow all the instructions given by the invigilators." 
        ];

        let instY = finalY + 6;
        instructions.forEach(inst => {
            const splitText = doc.splitTextToSize(inst, 180);
            doc.text(splitText, 15, instY);
            instY += (splitText.length * 4.5);
        });

        doc.save('GEHU_AdmitCard_' + data.roll_no + '.pdf');

    } catch(e) {
        alert('Could not generate PDF. Please try again.');
        console.error("PDF Error:", e);
    }
}
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
</head>
</html>
